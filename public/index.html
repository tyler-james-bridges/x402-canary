<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X402 CANARY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: "Geist Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      border-bottom: 2px solid #fff;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 8px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    header .meta {
      color: #666;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .summary-bar {
      border-bottom: 2px solid #fff;
      padding: 12px 24px;
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #666; }
    .stat-value { font-size: 18px; font-weight: 700; }
    .stat-value.x402-color { color: #0ff; }

    .endpoints {
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      border: 2px solid #fff;
      padding: 16px;
    }

    .card.down { border-color: #f00; }
    .card.x402 { border-color: #0ff; }
    .card.down.x402 { border-color: #f00; } /* down takes priority */

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 8px;
    }

    .card-name {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      word-break: break-all;
    }

    .badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 6px;
      border: 2px solid #fff;
      white-space: nowrap;
    }

    .badge.up { border-color: #fff; color: #fff; }
    .badge.down { border-color: #f00; color: #f00; }
    .badge.unknown { border-color: #666; color: #666; }
    .badge.x402-badge { border-color: #0ff; color: #0ff; }

    .card-desc {
      color: #666;
      font-size: 11px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .card-url {
      font-size: 10px;
      color: #666;
      margin-bottom: 14px;
      word-break: break-all;
    }

    .x402-info {
      border: 1px solid #0ff;
      padding: 8px 10px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .x402-field { display: flex; flex-direction: column; gap: 1px; }
    .x402-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: #0ff; }
    .x402-value { font-size: 11px; word-break: break-all; color: #fff; }
    .x402-value.null { color: #666; font-style: italic; }
    .x402-value.mismatch { color: #f80; }
    .x402-value.highlight { color: #0f0; }
    .x402-expected { color: #444; font-size: 8px; text-transform: none; letter-spacing: 0; }
    .x402-price-field { grid-column: span 2; }

    .card-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      border-top: 1px solid #444;
      padding-top: 12px;
    }

    .metric { display: flex; flex-direction: column; gap: 2px; }
    .metric-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: #666; }
    .metric-value { font-size: 13px; font-weight: 500; }

    .loading { padding: 48px 24px; text-transform: uppercase; letter-spacing: 0.1em; color: #666; }
    .error-msg { padding: 48px 24px; text-transform: uppercase; letter-spacing: 0.1em; color: #f00; }

    .refresh-info {
      padding: 12px 24px;
      border-top: 2px solid #fff;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 480px) {
      header { padding: 16px; }
      .endpoints { padding: 16px; grid-template-columns: 1fr; }
      .summary-bar { padding: 12px 16px; gap: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>X402 Canary</h1>
    <div class="meta">Agent Economy Health Monitor</div>
  </header>

  <div class="summary-bar">
    <div class="stat">
      <span class="stat-label">Endpoints</span>
      <span class="stat-value" id="stat-total">--</span>
    </div>
    <div class="stat">
      <span class="stat-label">Online</span>
      <span class="stat-value" id="stat-up">--</span>
    </div>
    <div class="stat">
      <span class="stat-label">Degraded</span>
      <span class="stat-value" id="stat-down">--</span>
    </div>
    <div class="stat">
      <span class="stat-label">x402 Enabled</span>
      <span class="stat-value x402-color" id="stat-x402">--</span>
    </div>
  </div>

  <div id="content">
    <div class="loading">Loading...</div>
  </div>

  <div class="refresh-info">
    <span>Auto-refresh every 30s</span>
    <span id="last-updated">--</span>
  </div>

  <script>
    function fmt(ms) {
      if (ms == null || ms === 0) return '--';
      if (ms < 1000) return ms + 'ms';
      return (ms / 1000).toFixed(1) + 's';
    }

    function badgeClass(ep) {
      if (ep.lastChecked == null) return 'unknown';
      return ep.isHealthy ? 'up' : 'down';
    }

    function badgeText(ep) {
      if (ep.lastChecked == null) return 'PENDING';
      return ep.isHealthy ? 'UP' : 'DOWN';
    }

    function statusLabel(ep) {
      if (ep.lastStatus == null) return '';
      return ` (${ep.lastStatus})`;
    }

    function renderX402Info(details) {
      if (!details) return '';

      // Server normalizes x402Details to { price, network, token, version }
      const { price, network, token, version } = details;

      const field = (label, val) =>
        `<div class="x402-field">
          <div class="x402-label">${label}</div>
          <div class="x402-value ${val ? '' : 'null'}">${val || 'N/A'}</div>
        </div>`;

      return `<div class="x402-info">
        <div class="x402-field x402-price-field">
          <div class="x402-label">Price</div>
          <div class="x402-value ${price ? '' : 'null'}">${price || 'N/A'}</div>
        </div>
        ${field('Network', network)}
        ${field('Token', token || 'USDC')}
        ${field('Version', version || 'x402')}
      </div>`;
    }

    function renderCard(ep) {
      const bc = badgeClass(ep);
      const cardClass = ['card', bc === 'down' ? 'down' : '', ep.isX402 ? 'x402' : ''].filter(Boolean).join(' ');

      return `
        <div class="${cardClass}">
          <div class="card-header">
            <div class="card-name">${ep.name || ep.url}</div>
            <div class="badges">
              <div class="badge ${bc}">${badgeText(ep)}${statusLabel(ep)}</div>
              ${ep.isX402 ? '<div class="badge x402-badge">X402</div>' : ''}
            </div>
          </div>
          <div class="card-desc">${ep.description || ''}</div>
          <div class="card-url">${ep.url}</div>
          ${ep.isX402 ? renderX402Info(ep.x402Details) : ''}
          <div class="card-metrics">
            <div class="metric">
              <div class="metric-label">Response</div>
              <div class="metric-value">${fmt(ep.responseTimeMs)}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Status</div>
              <div class="metric-value">${ep.status || 'ERR'}</div>
            </div>
          </div>
        </div>
      `;
    }

    let refreshTimer;

    async function fetchAndRender() {
      try {
        const res = await fetch('/api/health');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const eps = data.endpoints;

        const { total, online: up, degraded: down, x402Enabled: x402Count } = data.summary;

        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-up').textContent = `${up}/${total}`;
        document.getElementById('stat-down').textContent = down;
        document.getElementById('stat-x402').textContent = `${x402Count}/${total}`;

        document.getElementById('content').innerHTML =
          `<div class="endpoints">${eps.map(renderCard).join('')}</div>`;

        const ts = new Date(data.timestamp);
        document.getElementById('last-updated').textContent =
          'Last updated: ' + ts.toLocaleTimeString();
      } catch (err) {
        document.getElementById('content').innerHTML =
          `<div class="error-msg">Failed to load: ${err.message}</div>`;
      }
    }

    function scheduleRefresh() {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => {
        fetchAndRender().then(scheduleRefresh);
      }, 30_000);
    }

    fetchAndRender().then(scheduleRefresh);
  </script>
</body>
</html>
